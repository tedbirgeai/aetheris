# Aetheris Gateway v0.3a - Uretim Yigini
# PostgreSQL 16 + Redis 7 + Gateway (WAL + dagitik rate limit + failover)
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: aetheris
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aetheris}
      POSTGRES_DB: aetheris
    ports:
      - "5432:5432"
    volumes:
      - aetheris_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aetheris"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1"]
    ports:
      - "6379:6379"
    volumes:
      - aetheris_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  gateway:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      AETHERIS_LISTEN: ":8080"
      AETHERIS_STORE: "postgres"
      AETHERIS_DATABASE_DSN: "postgres://aetheris:${POSTGRES_PASSWORD:-aetheris}@postgres:5432/aetheris?sslmode=disable"
      AETHERIS_REDIS_ADDR: "redis:6379"
      AETHERIS_WAL_ENABLED: "true"
      AETHERIS_WAL_DIR: "/wal"
      AETHERIS_HEALTHPROBE: "true"
      AETHERIS_API_KEYS: "${AETHERIS_API_KEYS}"
      AETHERIS_RECEIPT_SECRET: "${AETHERIS_RECEIPT_SECRET}"
      AETHERIS_ROUTES: "${AETHERIS_ROUTES:-}"
    volumes:
      - aetheris_wal:/wal
    ports:
      - "8080:8080"
    restart: unless-stopped

volumes:
  aetheris_pgdata:
  aetheris_redisdata:
  aetheris_wal:
